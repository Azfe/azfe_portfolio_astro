name: Frontend — Lint & Type Check

on:
  push:
    branches: ["**"]
    paths:
      - "portfolio_frontend/**"
  pull_request:
    paths:
      - "portfolio_frontend/**"

defaults:
  run:
    working-directory: portfolio_frontend

jobs:
  lint:
    name: ESLint + tsc + Prettier
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 22
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Cache node_modules
        uses: actions/cache@v4
        with:
          path: portfolio_frontend/node_modules
          key: node-modules-${{ runner.os }}-${{ hashFiles('portfolio_frontend/package-lock.json') }}
          restore-keys: |
            node-modules-${{ runner.os }}-

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint
        run: npm run lint

      - name: Type check (tsc --noEmit)
        run: npm run typecheck

      - name: Prettier format check
        run: npm run format:check
