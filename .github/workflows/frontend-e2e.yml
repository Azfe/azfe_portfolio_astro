name: Frontend — E2E Tests (Playwright)

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
      - develop

jobs:
  build:
    if: false
    name: Build for E2E
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 22
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Cache node_modules
        uses: actions/cache@v4
        with:
          path: node_modules
          key: node-modules-${{ runner.os }}-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            node-modules-${{ runner.os }}-

      - name: Cache Astro build cache
        uses: actions/cache@v4
        with:
          path: .astro
          key: astro-cache-${{ runner.os }}-${{ hashFiles('package-lock.json') }}-${{ hashFiles('src/**') }}
          restore-keys: |
            astro-cache-${{ runner.os }}-${{ hashFiles('package-lock.json') }}-
            astro-cache-${{ runner.os }}-

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
        env:
          PUBLIC_API_URL: ${{ vars.PUBLIC_API_URL || 'http://localhost:8000/api/v1' }}
          PUBLIC_SITE_URL: ${{ vars.PUBLIC_SITE_URL || 'https://azfe.dev' }}
          PUBLIC_SITE_NAME: ${{ vars.PUBLIC_SITE_NAME || 'Azfe.dev' }}

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: astro-dist-e2e
          path: dist/
          retention-days: 1

  e2e:
    if: false
    name: Playwright E2E
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 22
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Cache node_modules
        uses: actions/cache@v4
        with:
          path: node_modules
          key: node-modules-${{ runner.os }}-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            node-modules-${{ runner.os }}-

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: astro-dist-e2e
          path: dist/

      - name: Run Playwright tests
        run: npm run test:e2e
        env:
          # La API se mockea con Playwright route interception — no se levanta el backend real
          CI: true

      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
