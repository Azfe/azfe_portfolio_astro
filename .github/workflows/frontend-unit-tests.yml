name: Frontend — Unit Tests

on:
  push:
    branches: ["**"]
    paths:
      - "portfolio_frontend/**"
  pull_request:
    paths:
      - "portfolio_frontend/**"

defaults:
  run:
    working-directory: portfolio_frontend

jobs:
  unit-tests:
    name: Vitest
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 22
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Cache node_modules
        uses: actions/cache@v4
        with:
          path: portfolio_frontend/node_modules
          key: node-modules-${{ runner.os }}-${{ hashFiles('portfolio_frontend/package-lock.json') }}
          restore-keys: |
            node-modules-${{ runner.os }}-

      - name: Install dependencies
        run: npm ci

      - name: Run unit tests with coverage
        run: npm run test:coverage

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: portfolio_frontend/coverage/
          retention-days: 7
