name: Frontend — Lighthouse CI

on:
  pull_request:
    branches:
      - main
    paths:
      - "portfolio_frontend/**"

defaults:
  run:
    working-directory: portfolio_frontend

jobs:
  build:
    name: Build for Lighthouse
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 22
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Cache node_modules
        uses: actions/cache@v4
        with:
          path: portfolio_frontend/node_modules
          key: node-modules-${{ runner.os }}-${{ hashFiles('portfolio_frontend/package-lock.json') }}
          restore-keys: |
            node-modules-${{ runner.os }}-

      - name: Cache Astro build cache
        uses: actions/cache@v4
        with:
          path: portfolio_frontend/.astro
          key: astro-cache-${{ runner.os }}-${{ hashFiles('portfolio_frontend/package-lock.json') }}-${{ hashFiles('portfolio_frontend/src/**') }}
          restore-keys: |
            astro-cache-${{ runner.os }}-${{ hashFiles('portfolio_frontend/package-lock.json') }}-
            astro-cache-${{ runner.os }}-

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
        env:
          PUBLIC_API_URL: ${{ vars.PUBLIC_API_URL || 'http://localhost:8000/api/v1' }}
          PUBLIC_SITE_URL: ${{ vars.PUBLIC_SITE_URL || 'https://azfe.dev' }}
          PUBLIC_SITE_NAME: ${{ vars.PUBLIC_SITE_NAME || 'Azfe.dev' }}

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: astro-dist-lighthouse
          path: portfolio_frontend/dist/
          retention-days: 1

  lighthouse:
    name: Lighthouse CI
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 22
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Cache node_modules
        uses: actions/cache@v4
        with:
          path: portfolio_frontend/node_modules
          key: node-modules-${{ runner.os }}-${{ hashFiles('portfolio_frontend/package-lock.json') }}
          restore-keys: |
            node-modules-${{ runner.os }}-

      - name: Install dependencies
        run: npm ci

      - name: Install Lighthouse CI
        run: npm install -g @lhci/cli@0.14.x

      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: astro-dist-lighthouse
          path: portfolio_frontend/dist/

      - name: Run Lighthouse CI
        run: lhci autorun
        env:
          LHCI_GITHUB_APP_TOKEN: ${{ secrets.LHCI_GITHUB_APP_TOKEN }}
